<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ว่างไหม?</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --blue:#1a73e8;--blue-light:#e8f0fe;
      --green:#0f9d58;--yellow:#f9ab00;--purple:#9334e9;--orange:#fa7b17;
      --gray50:#f8f9fa;--gray100:#f1f3f4;--gray200:#e8eaed;
      --gray400:#bdc1c6;--gray600:#80868b;--gray700:#5f6368;--gray900:#202124;
      --surface:#fff;--border:#dadce0;
      --radius:8px;--header-h:60px;--font:'Google Sans','Roboto',sans-serif;
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--font);background:var(--gray50);color:var(--gray900);display:flex;flex-direction:column;}

    /* ══ HEADER ══ */
    .header{
      height:var(--header-h);background:var(--surface);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 16px;gap:12px;
      position:sticky;top:0;z-index:200;flex-shrink:0;
    }
    .header-title{font-size:20px;font-weight:600;color:var(--gray900);flex:1;}
    .header-title span{color:var(--blue);}
    .btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:var(--gray700);font-size:18px;}
    .btn-icon:hover{background:var(--gray100);}
    .btn-today{
      border:1px solid var(--border);border-radius:20px;
      padding:6px 16px;font-family:var(--font);font-size:13px;font-weight:500;
      color:var(--gray700);background:var(--surface);cursor:pointer;
    }
    .btn-today:hover{background:var(--gray50);}

    /* ══ LAYOUT ══ */
    .app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

    /* ══ PERSON CHIPS ══ */
    .person-bar{
      padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;gap:6px;overflow-x:auto;flex-shrink:0;
    }
    .person-bar::-webkit-scrollbar{display:none;}
    .chip{
      display:flex;align-items:center;gap:4px;
      padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;
      border:none;cursor:pointer;white-space:nowrap;transition:.15s;
      background:var(--gray100);color:var(--gray700);
    }
    .chip.active{color:#fff;}
    .chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* ══ NAV (month prev/next) ══ */
    .month-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 16px;background:var(--surface);flex-shrink:0;
    }
    .month-label{font-size:15px;font-weight:600;color:var(--gray900);}
    .nav-arrows{display:flex;gap:4px;}

    /* ══ CALENDAR ══ */
    .cal-scroll{flex:1;overflow-y:auto;padding:0 0 80px;}
    .cal-grid{
      display:grid;grid-template-columns:repeat(7,minmax(0,1fr));
      background:var(--border);gap:1px;
    }
    .cal-header-row{
      display:grid;grid-template-columns:repeat(7,minmax(0,1fr));
      background:var(--surface);border-bottom:1px solid var(--border);
    }
    .cal-dow{
      text-align:center;font-size:11px;font-weight:600;color:var(--gray600);
      padding:8px 0;text-transform:uppercase;letter-spacing:.5px;
    }
    .cal-cell{
      background:var(--surface);min-height:80px;padding:4px;
      display:flex;flex-direction:column;gap:2px;cursor:pointer;
      transition:.1s;
    }
    .cal-cell:hover{background:var(--gray50);}
    .cal-cell.other-month{background:#fafafa;}
    .cal-cell.other-month .cal-day-num{color:var(--gray400);}
    .cal-cell.today .cal-day-num{
      background:var(--blue);color:#fff;border-radius:50%;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    }
    .cal-day-num{font-size:12px;font-weight:500;color:var(--gray700);width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
    .cal-chips{display:flex;flex-direction:column;gap:1px;min-width:0;}
    .cal-avail{
      display:flex;align-items:center;gap:2px;
      border-radius:3px;padding:1px 4px;font-size:10px;font-weight:500;
      color:#fff;min-width:0;overflow:hidden;
    }
    .cal-avail-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
    .cal-avail-slots{font-size:9px;flex-shrink:0;}
    .cal-more{font-size:10px;color:var(--blue);padding:1px 4px;cursor:pointer;}

    /* ══ FAB ══ */
    .fab{
      position:fixed;bottom:24px;right:20px;z-index:300;
      width:56px;height:56px;border-radius:16px;
      background:var(--blue);color:#fff;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:24px;
      box-shadow:0 4px 12px rgba(26,115,232,.4);transition:.2s;
    }
    .fab:hover{background:var(--blue-dark,#1557b0);transform:scale(1.05);}
    .fab:active{transform:scale(.96);}

    /* ══ MODAL OVERLAY ══ */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:.2s;
    }
    .overlay.open{opacity:1;pointer-events:all;}
    .sheet{
      background:var(--surface);border-radius:20px 20px 0 0;
      width:100%;max-width:480px;
      padding:0 0 env(safe-area-inset-bottom,16px);
      transform:translateY(100%);transition:.25s cubic-bezier(.4,0,.2,1);
      max-height:90vh;overflow-y:auto;
    }
    .overlay.open .sheet{transform:translateY(0);}
    .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--gray200);margin:12px auto 0;}
    .sheet-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px 8px;
    }
    .sheet-title{font-size:16px;font-weight:600;color:var(--gray900);}
    .sheet-body{padding:4px 16px 20px;}

    /* ══ FORM ══ */
    .form-row{margin-bottom:14px;}
    .form-label{font-size:12px;font-weight:600;color:var(--gray700);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px;}
    .form-input{
      width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
      font-family:var(--font);font-size:15px;color:var(--gray900);background:var(--surface);
      outline:none;transition:.15s;
    }
    .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-light);}

    /* ══ SLOT PICKER ══ */
    .slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .slot-btn{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      padding:14px 8px;border-radius:12px;border:2px solid var(--border);
      font-family:var(--font);cursor:pointer;background:var(--surface);transition:.15s;
    }
    .slot-btn:hover{background:var(--gray50);}
    .slot-btn.selected{border-color:var(--blue);background:var(--blue-light);}
    .slot-emoji{font-size:22px;}
    .slot-name{font-size:13px;font-weight:600;color:var(--gray900);}
    .slot-time{font-size:11px;color:var(--gray600);}

    /* ══ ACTION BTNS ══ */
    .btn-row{display:flex;gap:10px;margin-top:18px;}
    .btn-save{
      flex:1;padding:12px;border-radius:10px;border:none;
      background:var(--blue);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;
      cursor:pointer;transition:.15s;
    }
    .btn-save:hover{background:#1557b0;}
    .btn-save:disabled{opacity:.6;cursor:not-allowed;}
    .btn-cancel{
      padding:12px 20px;border-radius:10px;border:1px solid var(--border);
      background:var(--surface);color:var(--gray700);font-family:var(--font);font-size:15px;font-weight:500;
      cursor:pointer;transition:.15s;
    }
    .btn-cancel:hover{background:var(--gray50);}
    .btn-delete{
      padding:12px 16px;border-radius:10px;border:none;
      background:#fce8e6;color:#c5221f;font-family:var(--font);font-size:15px;font-weight:500;
      cursor:pointer;transition:.15s;
    }
    .btn-delete:hover{background:#f5c6c2;}
    .btn-delete:disabled{opacity:.6;cursor:not-allowed;}

    /* ══ DETAIL SHEET ══ */
    .detail-person{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .detail-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
    .detail-name{font-size:18px;font-weight:600;}
    .detail-date{font-size:14px;color:var(--gray600);margin-bottom:14px;}
    .slot-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .slot-tag{
      display:flex;align-items:center;gap:4px;
      padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;
      background:var(--blue-light);color:var(--blue);
    }

    /* ══ TOAST ══ */
    .toast{
      position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
      background:rgba(32,33,36,.9);color:#fff;padding:10px 18px;border-radius:24px;
      font-size:13px;font-weight:500;z-index:600;white-space:nowrap;
      opacity:0;transition:.3s;pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ══ LOADING ══ */
    .loading-bar{height:3px;background:var(--blue);width:0;position:fixed;top:0;left:0;z-index:999;transition:width .3s;}

    /* ══ DESKTOP ══ */
    @media(min-width:640px){
      .cal-cell{min-height:100px;}
      .cal-avail{font-size:11px;}
      .overlay{align-items:center;}
      .sheet{border-radius:20px;max-height:80vh;}
    }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-title">ว่าง<span>ไหม?</span></div>
  <button class="btn-today" onclick="goToday()">วันนี้</button>
  <button class="btn-icon" onclick="syncData(true)" title="รีเฟรช">🔄</button>
</div>

<!-- PERSON FILTER -->
<div class="person-bar" id="personBar">
  <button class="chip active" data-person="all" onclick="filterPerson('all',this)" style="background:var(--blue);color:#fff;">
    ทุกคน
  </button>
</div>

<!-- APP BODY -->
<div class="app-body">
  <!-- MONTH NAV -->
  <div class="month-nav">
    <button class="btn-icon" onclick="prevMonth()">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="btn-icon" onclick="nextMonth()">›</button>
  </div>

  <!-- CALENDAR -->
  <div class="cal-scroll" id="calScroll">
    <div class="cal-header-row">
      <div class="cal-dow">อา</div>
      <div class="cal-dow">จ</div>
      <div class="cal-dow">อ</div>
      <div class="cal-dow">พ</div>
      <div class="cal-dow">พฤ</div>
      <div class="cal-dow">ศ</div>
      <div class="cal-dow">ส</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddSheet()" title="ลงวันว่าง">＋</button>

<!-- ADD / EDIT OVERLAY -->
<div class="overlay" id="addOverlay" onclick="overlayBgClick(event,'addOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">ลงวันว่าง</div>
      <button class="btn-icon" onclick="closeSheet('addOverlay')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="form-row">
        <label class="form-label">ชื่อ</label>
        <input class="form-input" id="fPerson" type="text" placeholder="ชื่อของคุณ" autocomplete="off" />
      </div>
      <div class="form-row">
        <label class="form-label">วันที่</label>
        <input class="form-input" id="fDate" type="date" />
      </div>
      <div class="form-row">
        <label class="form-label">ว่างช่วงไหน?</label>
        <div class="slot-grid">
          <button class="slot-btn" data-slot="all" onclick="toggleSlot(this)">
            <span class="slot-emoji">🌟</span>
            <span class="slot-name">ว่างทั้งวัน</span>
            <span class="slot-time">ตลอดทั้งวัน</span>
          </button>
          <button class="slot-btn" data-slot="morn" onclick="toggleSlot(this)">
            <span class="slot-emoji">☀️</span>
            <span class="slot-name">ช่วงเช้า</span>
            <span class="slot-time">06:00 – 12:00</span>
          </button>
          <button class="slot-btn" data-slot="noon" onclick="toggleSlot(this)">
            <span class="slot-emoji">🌤️</span>
            <span class="slot-name">ช่วงบ่าย</span>
            <span class="slot-time">12:00 – 18:00</span>
          </button>
          <button class="slot-btn" data-slot="eve" onclick="toggleSlot(this)">
            <span class="slot-emoji">🌙</span>
            <span class="slot-name">เย็น/คืน</span>
            <span class="slot-time">18:00 – 24:00</span>
          </button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closeSheet('addOverlay')">ยกเลิก</button>
        <button class="btn-save" id="btnSave" onclick="saveEvent()">บันทึก</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="overlayBgClick(event,'detailOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">รายละเอียด</div>
      <button class="btn-icon" onclick="closeSheet('detailOverlay')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="detail-person">
        <div class="detail-dot" id="detailDot"></div>
        <div class="detail-name" id="detailName"></div>
      </div>
      <div class="detail-date" id="detailDate"></div>
      <div class="slot-tags" id="detailSlots"></div>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn-delete" id="btnDelete" onclick="deleteEvent()">🗑 ลบ</button>
        <button class="btn-save" style="flex:1;" onclick="openEditFromDetail()">✏️ แก้ไข</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ══
const API_URL = 'https://script.google.com/macros/s/AKfycbyuHp8nxPUixHlQHDe3fqgL7aty89GPi2gOr2ZFl32G8KMe2SXuBNGui3Eiy6jMTtH4tQ/exec';

// ══ SLOT META ══
const SLOT_META = {
  all:  { label:'ว่างทั้งวัน', emoji:'🌟' },
  morn: { label:'ช่วงเช้า',   emoji:'☀️' },
  noon: { label:'ช่วงบ่าย',  emoji:'🌤️' },
  eve:  { label:'เย็น/คืน',  emoji:'🌙' },
};

// ══ COLORS ══
const PALETTE = ['#1a73e8','#0f9d58','#9334e9','#fa7b17','#d93025','#00796b','#c62828','#283593'];
const personColor = {};
let colorIdx = 0;
function getColor(name) {
  if (!personColor[name]) personColor[name] = PALETTE[colorIdx++ % PALETTE.length];
  return personColor[name];
}

// ══ STATE ══
let events = [];
let filterPer = 'all';
let editRow = null;
let detailEvent = null;
let curYear, curMonth;
let syncTimer;

// ══ INIT ══
(function(){
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  syncData(true);
  startAutoSync();
  document.addEventListener('visibilitychange', () => { if (!document.hidden) silentSync(); });
})();

// ══ SYNC ══
function startAutoSync() {
  clearInterval(syncTimer);
  syncTimer = setInterval(silentSync, 30000);
}
async function silentSync() {
  try {
    const data = await fetchEvents();
    if (JSON.stringify(data) !== JSON.stringify(events)) {
      events = data;
      renderAll();
    }
  } catch(_){}
}
async function syncData(showLoading) {
  if (showLoading) setLoading(true);
  try {
    events = await fetchEvents();
    renderAll();
    if (showLoading) showToast('มาลงเวลาว่างกันเถอะ จะได้นัดกันไปปาร์ตี้ 🎉');
  } catch(e) {
    showToast('โหลดข้อมูลไม่ได้ 😅');
  } finally {
    setLoading(false);
  }
}
async function fetchEvents() {
  const r = await fetch(API_URL + '?action=getAll');
  const j = await r.json();
  if (j.status !== 'ok') throw new Error(j.message);
  return j.events || [];
}

// ══ LOADING ══
function setLoading(on) {
  const bar = document.getElementById('loadingBar');
  bar.style.width = on ? '70%' : (on === false ? '100%' : bar.style.width);
  if (!on) setTimeout(() => { bar.style.width = '0'; }, 400);
}

// ══ RENDER ══
function renderAll() {
  renderPersonBar();
  renderCalendar();
}

function renderPersonBar() {
  const bar = document.getElementById('personBar');
  const people = [...new Set(events.map(e => e.person).filter(Boolean))].sort();
  // assign colors
  people.forEach(p => getColor(p));

  let html = `<button class="chip ${filterPer==='all'?'active':''}" data-person="all" onclick="filterPerson('all',this)" style="${filterPer==='all'?'background:var(--blue);color:#fff;':''}">ทุกคน</button>`;
  people.forEach(p => {
    const col = getColor(p);
    const active = filterPer === p;
    html += `<button class="chip ${active?'active':''}" data-person="${p}" onclick="filterPerson('${p}',this)" style="${active?`background:${col};color:#fff;`:''}">
      <span class="chip-dot" style="background:${col}"></span>${p}
    </button>`;
  });
  bar.innerHTML = html;
}

function renderCalendar() {
  const label = new Date(curYear, curMonth, 1).toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  document.getElementById('monthLabel').textContent = label;

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  const grid = document.getElementById('calGrid');
  const cells = [];

  // prev month padding
  const prevDays = new Date(curYear, curMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevDays - i, cur: false, date: new Date(curYear, curMonth-1, prevDays-i) });
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, cur: true, date: new Date(curYear, curMonth, d) });
  }
  // next month padding
  const rem = cells.length % 7;
  if (rem) for (let d = 1; d <= 7 - rem; d++) {
    cells.push({ day: d, cur: false, date: new Date(curYear, curMonth+1, d) });
  }

  // group events by date string
  const byDate = {};
  const filtered = filterPer === 'all' ? events : events.filter(e => e.person === filterPer);
  filtered.forEach(ev => {
    if (!byDate[ev.date]) byDate[ev.date] = [];
    byDate[ev.date].push(ev);
  });

  grid.innerHTML = cells.map(cell => {
    const ds = dateStr(cell.date);
    const isToday = cell.date.getTime() === today.getTime() && cell.cur;
    const evs = byDate[ds] || [];

    const chips = evs.slice(0,3).map(ev => {
      const col = getColor(ev.person);
      const slots = (ev.slots||'').split(',').filter(Boolean);
      const emojis = slots.map(s => SLOT_META[s]?.emoji||'').join('');
      return `<div class="cal-avail" style="background:${col}" onclick="openDetail(event,'${ev.row}')">
        <span class="cal-avail-name">${esc(ev.person)}</span>
        <span class="cal-avail-slots">${emojis}</span>
      </div>`;
    }).join('');
    const more = evs.length > 3 ? `<div class="cal-more">+${evs.length-3} เพิ่มเติม</div>` : '';

    return `<div class="cal-cell ${cell.cur?'':'other-month'} ${isToday?'today':''}" onclick="cellClick('${ds}')">
      <div class="cal-day-num">${cell.day}</div>
      <div class="cal-chips">${chips}${more}</div>
    </div>`;
  }).join('');
}

// ══ NAVIGATION ══
function prevMonth() { curMonth--; if(curMonth<0){curMonth=11;curYear--;} renderCalendar(); }
function nextMonth() { curMonth++; if(curMonth>11){curMonth=0;curYear++;} renderCalendar(); }
function goToday() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  renderCalendar();
}

// ══ FILTER ══
function filterPerson(per, btn) {
  filterPer = per;
  renderAll();
}

// ══ CELL CLICK → open add for that date ══
function cellClick(ds) { openAddSheet(ds); }

// ══ ADD SHEET ══
function openAddSheet(ds) {
  editRow = null;
  document.getElementById('sheetTitle').textContent = 'ลงวันว่าง';
  document.getElementById('fPerson').value = localStorage.getItem('lastPerson') || '';
  document.getElementById('fDate').value = ds || dateStr(new Date());
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btnSave').disabled = false;
  openSheet('addOverlay');
}

function openEditFromDetail() {
  if (!detailEvent) return;
  closeSheet('detailOverlay');
  editRow = detailEvent.row;
  document.getElementById('sheetTitle').textContent = 'แก้ไข';
  document.getElementById('fPerson').value = detailEvent.person || '';
  document.getElementById('fDate').value = detailEvent.date || '';
  const slots = (detailEvent.slots||'').split(',').filter(Boolean);
  document.querySelectorAll('.slot-btn').forEach(b => {
    b.classList.toggle('selected', slots.includes(b.dataset.slot));
  });
  document.getElementById('btnSave').disabled = false;
  openSheet('addOverlay');
}

// ══ SLOT TOGGLE ══
function toggleSlot(btn) {
  const slot = btn.dataset.slot;
  if (slot === 'all') {
    // all-day: deselect others, toggle all
    const wasSelected = btn.classList.contains('selected');
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    if (!wasSelected) btn.classList.add('selected');
  } else {
    // deselect "all-day" if any partial selected
    document.querySelector('[data-slot="all"]').classList.remove('selected');
    btn.classList.toggle('selected');
  }
}

// ══ SAVE ══
async function saveEvent() {
  const person = document.getElementById('fPerson').value.trim();
  const date = document.getElementById('fDate').value;
  const slots = [...document.querySelectorAll('.slot-btn.selected')].map(b => b.dataset.slot).join(',');

  if (!person) { showToast('กรุณาใส่ชื่อ'); return; }
  if (!date) { showToast('กรุณาเลือกวันที่'); return; }
  if (!slots) { showToast('กรุณาเลือกช่วงเวลาที่ว่าง'); return; }

  localStorage.setItem('lastPerson', person);

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const payload = { person, date, slots };

  if (editRow) {
    // optimistic update
    const idx = events.findIndex(e => String(e.row) === String(editRow));
    const backup = idx >= 0 ? {...events[idx]} : null;
    if (idx >= 0) events[idx] = {...events[idx], ...payload};
    closeSheet('addOverlay');
    renderAll();
    try {
      await apiFetch({ action:'update', row: editRow, ...payload });
    } catch(e) {
      if (backup && idx >= 0) events[idx] = backup;
      renderAll();
      showToast('แก้ไขไม่สำเร็จ 😅');
    }
  } else {
    // optimistic add
    const tempRow = 'tmp_' + Date.now();
    const newEv = { row: tempRow, ...payload };
    events.push(newEv);
    closeSheet('addOverlay');
    renderAll();
    try {
      const res = await apiFetch({ action:'add', ...payload });
      const realRow = res.row;
      const i = events.findIndex(e => e.row === tempRow);
      if (i >= 0) events[i].row = realRow;
    } catch(e) {
      events = events.filter(e => e.row !== tempRow);
      renderAll();
      showToast('บันทึกไม่สำเร็จ 😅');
    }
  }

  btn.disabled = false;
  btn.textContent = 'บันทึก';
}

// ══ DETAIL ══
function openDetail(ev, rowStr) {
  ev.stopPropagation();
  detailEvent = events.find(e => String(e.row) === String(rowStr));
  if (!detailEvent) return;

  const col = getColor(detailEvent.person);
  document.getElementById('detailDot').style.background = col;
  document.getElementById('detailName').textContent = detailEvent.person;
  document.getElementById('detailDate').textContent = formatDateTH(detailEvent.date);

  const slots = (detailEvent.slots||'').split(',').filter(Boolean);
  document.getElementById('detailSlots').innerHTML = slots.map(s => {
    const m = SLOT_META[s] || {label:s, emoji:''};
    return `<div class="slot-tag">${m.emoji} ${m.label}</div>`;
  }).join('') || '<div style="color:var(--gray600);font-size:13px;">ไม่ได้ระบุช่วงเวลา</div>';

  document.getElementById('btnDelete').disabled = false;
  document.getElementById('btnDelete').textContent = '🗑 ลบ';
  openSheet('detailOverlay');
}

// ══ DELETE ══
async function deleteEvent() {
  if (!detailEvent) return;
  const btn = document.getElementById('btnDelete');
  btn.disabled = true;
  btn.textContent = 'กำลังลบ...';

  const rowToDelete = detailEvent.row;
  const backup = [...events];
  events = events.filter(e => String(e.row) !== String(rowToDelete));
  closeSheet('detailOverlay');
  renderAll();

  try {
    await apiFetch({ action:'delete', row: rowToDelete });
  } catch(e) {
    events = backup;
    renderAll();
    showToast('ลบไม่สำเร็จ 😅');
  }
}

// ══ API ══
async function apiFetch(body) {
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const j = await r.json();
  if (j.status !== 'ok') throw new Error(j.message);
  return j;
}

// ══ SHEET CONTROL ══
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function overlayBgClick(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

// ══ TOAST ══
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ══ UTILS ══
function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDateTH(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  return d.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
